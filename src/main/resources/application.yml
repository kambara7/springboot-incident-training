spring:
  application:
    name: incident-management

  datasource:
    driver-class-name: org.h2.Driver
    username: sa
    password:
    generate-unique-name: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

app:
  environment: local